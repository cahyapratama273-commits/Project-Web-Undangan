        <title>Undangan Pernikahan</title>

        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"

        crossorigin="anonymous"
        />
        <link rel="stylesheet" href="asset/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        href="https://fonts.googleapis.com/css2?family=My+Soul&display=swap"
        rel="stylesheet"

        <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">
        <style>
            body, html {
                margin: 0;
                padding: 0;
                overflow-x: hidden;
            }
            .rowen {
                position: relative;
                width: 100%;
                min-height: 100vh; 
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 1;
            }
            .rowen::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                overflow: hidden;
                background-image: url('asset/image/pemandangan.jpg'); 
                background-size: cover;
                background-position: center;
                filter: blur(8px);
                transform: scale(1.1); 
                z-index: -1;
    }
    .rowen::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.2); 
        z-index: -1;
    }
    .font-pica {
        font-family: 'IM Fell Double Pica', serif;
        /* font-style: italic;  */
    font-weight: 200;
    }
    .foto-oval {
        width: 325px;
        height: 465px;
        margin: 20px auto;
        /* border: 2px solid #000; */
        border-radius: 50%;
        overflow: hidden;
        position: relative; 
    }

    .foto-oval img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    .inisial-overlay {
        position: absolute;
        z-index: 2;
        font-family: 'My Soul', cursive;
        font-size: 5rem;
        color: #1b1818;
        margin: 0;
        line-height: 1; 
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
    }
    .inisial-1 {
        bottom: 80px;  
        left: 30%;   
        transform: rotate(-8px); 
    }


    .inisial-2 {
        bottom: 44px;  
        right: 30%;    
        transform: rotate(8px); 
    }
    /* .out {
        outline: solid 1px red;
    }
    .row {
        outline: red solid;
    } */
        table {
        border-collapse: collapse; 
        /* width: 700px;              
        height: 200px;            */
        text-align: center;
        margin: 20px auto; 
        

    }
    /* table, th, td {
        border: 1px solid black;  
    } */

    td {
        width: 33.33%;            
        height: 33.33%;           
        padding: 1px;
        background-color: #f2f2f2; 
        font-size: 2rem;
    }
    .Big {
        /* width: 33.33%;            
        height: 33.33%;  */
        padding: 1px;
        background-color: #f2f2f2; 
        font-size: 100px;
    }
    .kanan {
        text-align: right;
    }
    .kiri {
        text-align: left;
    }
    .invitation-card {
        outline: red;
    }

#konten {
    /* display: n; */
    min-height: 100vh;
    padding: 50px 0;
    background-color: #000000;
}


.guest-name {
    font-family: 'My Soul', cursive;
    margin-bottom: 0.5rem;
}

.top-section h1 {
    font-family: 'IM Fell Double Pica', serif;
    font-size: 1.5rem;
    color: #555;
    margin: 10px 0;
}


.tanggal {
    font-family: 'IM Fell Double Pica', serif;
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
}
.out {
    outline: red;
}
    </style>

<body>
    <div class="container-fluid p-0">
    <div class="row rowen m-0">
        
        <div class="col-12 mt-6 text-center">
        <h1 class="fs-2 font-pica">You're Invited To</h1>
        <h1 class="fs-3 font-pica">The Wedding of</h1>
        </div>

        <div class="col-12 text-center mt-4">
        <div class="foto-oval fw-bold">
            <img src="asset/image/guah.jpg" alt="Foto Pengantin">
            <span class="inisial-overlay inisial-1">D</span>
            <span class="inisial-overlay inisial-2">D</span>
        </div>
        </div>

        <div class="col-12 text-center mt-5">
    <a type="button" id="btn-open" class="btn btn-secondary px-4 py-2">Open Invitation</a>
</div>

<main id="konten">
    <div class="container mt-5 py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center text-white" >
      
      <div class="mb-4">
        <h2 style="font-family: 'Pinyon Script', cursive; font-size: 3.5rem;">
          Agum Renggie
        </h2>
        <span class="d-block my-2" style="font-size: 1.2rem;">&</span>
        <h2 style="font-family: 'Pinyon Script', cursive; font-size: 3.5rem;">
          Rembulan Dinara
        </h2>
      </div>

      <div class="row align-items-center gap-0 border-top border-bottom border-white py-3" style="max-width: 450px; margin: 0 auto;">
        
        <div class="col-4  column-gap-0">
          <p class="mb-0 text-uppercase" style="text-align: right; font-size: 0.9rem;">Wednesday</p>
        </div>

        <div class="col-4 px-2 border-end border-start">
          <div class="text-uppercase small" style="text-align: center; font-size: 0.7rem;">May</div>
          <div class="fw-normal" style="font-size: 4.5rem; margin: 5px 0; text-align: center;">15</div>
          <div class="small" style="text-align: center; font-size: 0.7rem;">2030</div>
        </div>

        <div class="col-4 e">
          <p class="mt-0 text-uppercase" style="text-align: left; font-size: 0.9rem;">At 10.00</p>
        </div>

      </div>

    </div>
  </div>
</div>
</main>
