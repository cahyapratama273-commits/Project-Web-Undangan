<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Undangan Pernikahan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&family=My+Soul&family=Pinyon+Script&family=Playfair+Display:ital@1&family=Vollkorn&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="asset/style.css" />
</head>
<body>

    <div class="wedding-container">
        <header class="invitation-header">
        <div class="lengkung"></div>

    <div class="header-text">
        <h1 class="title-small">You're Invited To</h1>
        <h2 class="title-main">The Wedding of</h2>
    </div>
    
    <div class="photo-section">
        </div>
            <div class="photo-section">
                <div class="foto-oval">
                    <img src="asset/image/guah.jpg" alt="Foto Pengantin">
                    <span class="inisial-overlay inisial-1">D</span>
                    <span class="inisial-overlay inisial-2">D</span>
                </div>
            </div>

            <div class="button-wrapper">
                <a href="#konten" id="btn-open" class="btn-custom">Open Invitation</a>
            </div>
        </header>

        <main id="konten">
            <div class="content-container">
                <div class="couple-names">
                    <h2 class="name-text">Agum Renggi</h2>
                    <span class="ampersand">&</span>
                    <h2 class="name-text">Rembulan Dinara</h2>
                </div>

                <div class="date-grid">
                    <div class="day-col">
                        <p>WEDNESDAY</p>
                    </div>

                    <div class="date-col">
                        <div class="month">MAY</div>
                        <div class="day-number">15</div>
                        <div class="year">2030</div>
                    </div>

                    <div class="time-col">
                        <p>AT 10.00 AM</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
