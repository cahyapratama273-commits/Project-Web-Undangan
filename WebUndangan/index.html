    <!doctype html>
    <html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Undangan Pernikahan</title>
        <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
        />
        <link rel="stylesheet" href="asset/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
        href="https://fonts.googleapis.com/css2?family=My+Soul&display=swap"
        rel="stylesheet"
        />
        <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">
        <style>
            body, html {
                margin: 0;
                padding: 0;
                overflow-x: hidden;
            }
            .rowen {
                position: relative;
                width: 100%;
                min-height: 100vh; 
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 1;
            }
            .rowen::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                overflow: hidden;
                background-image: url('asset/image/pemandangan.jpg'); 
                background-size: cover;
                background-position: center;
                filter: blur(8px);
                transform: scale(1.1); 
                z-index: -1;
    }
    .rowen::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.2); 
        z-index: -1;
    }
    .font-pica {
        font-family: 'IM Fell Double Pica', serif;
        /* font-style: italic;  */
    font-weight: 200;
    }
    .foto-oval {
        width: 325px;
        height: 465px;
        margin: 20px auto;
        /* border: 2px solid #000; */
        border-radius: 50%;
        overflow: hidden;
        position: relative; 
    }

    .foto-oval img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    .inisial-overlay {
        position: absolute;
        z-index: 2;
        font-family: 'My Soul', cursive;
        font-size: 5rem;
        color: #1b1818;
        margin: 0;
        line-height: 1; 
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
    }
    .inisial-1 {
        bottom: 80px;  
        left: 30%;   
        transform: rotate(-8px); 
    }


    .inisial-2 {
        bottom: 44px;  
        right: 30%;    
        transform: rotate(8px); 
    }
    /* .out {
        outline: solid 1px red;
    }
    .row {
        outline: red solid;
    } */
        table {
        border-collapse: collapse; 
        /* width: 700px;              
        height: 200px;            */
        text-align: center;
        margin: 20px auto; 
        

    }
    /* table, th, td {
        border: 1px solid black;  
    } */

    td {
        width: 33.33%;            
        height: 33.33%;           
        padding: 1px;
        background-color: #f2f2f2; 
        font-size: 2rem;
    }
    .Big {
        /* width: 33.33%;            
        height: 33.33%;  */
        padding: 1px;
        background-color: #f2f2f2; 
        font-size: 100px;
    }
    .kanan {
        text-align: right;
    }
    .kiri {
        text-align: left;
    }
    .invitation-card {
        outline: red;
    }

#konten {
    display: none;
    min-height: 100vh;
    padding: 50px 0;
    background-color: #000000;
}


.guest-name {
    font-family: 'My Soul', cursive;
    margin-bottom: 0.5rem;
}

.top-section h1 {
    font-family: 'IM Fell Double Pica', serif;
    font-size: 1.5rem;
    color: #555;
    margin: 10px 0;
}


.tanggal {
    font-family: 'IM Fell Double Pica', serif;
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
}
    </style>
    </head>
    <body>
    <div class="container-fluid p-0">
    <div class="row rowen m-0">
        
        <div class="col-12 mt-6 text-center">
        <h1 class="fs-2 font-pica">You're Invited To</h1>
        <h1 class="fs-3 font-pica">The Wedding of</h1>
        </div>

        <div class="col-12 text-center mt-4">
        <div class="foto-oval">
            <img src="asset/image/guah.jpg" alt="Foto Pengantin">
            <span class="inisial-overlay inisial-1">D</span>
            <span class="inisial-overlay inisial-2">D</span>
        </div>
        </div>

        <div class="col-12 text-center mt-5">
    <a type="button" id="btn-open" class="btn btn-secondary px-4 py-2">Open Invitation</a>
</div>

<main id="konten">
    <div class="container">
        <div class="invitation-card text-center">
            <div class="content">
                <div class="top-section mb-5">
                    <h1>- The Best Day Ever -</h1>
                    <h2 class="guest-name" style="font-size: 3.5rem;">Dharma & Dianara</h2>
                    <h1>Are Getting Married</h1>
                </div>

                <div class="names-detail mb-5">
                    <h2 class="guest-name" style="font-size: 2.5rem;">Adi Dharma Pramana</h2>
                    <h2 class="guest-name" style="font-size: 2rem;">&</h2>
                    <h2 class="guest-name" style="font-size: 2.5rem;">Rembulan Dinara</h2>
                </div>

                <table class="mx-auto">
                    <tr>
                        <td></td>
                        <td class="tanggal">June</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td class="tanggal kanan pe-3">Wednesday</td>
                        <td class="Big px-4" style="border-left: 2px solid #000; border-right: 2px solid #000;">16</td>
                        <td class="tanggal kiri ps-3">At 10.00</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td class="tanggal">2026</td>
                        <td></td>
                    </tr>
                </table>

                <div class="footer-note mt-5">
                    <p class="font-pica">We can't wait to see you there!</p>
                </div>
            </div>
        </div>
    </div>
</main>
    </div>    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">

    document.addEventListener('DOMContentLoaded', function() {
        const btnOpen = document.getElementById('btn-open');
        const konten = document.getElementById('konten');

        btnOpen.addEventListener('click', function() {
            konten.style.display = 'block';

            konten.scrollIntoView({ 
                behavior: 'smooth' 
            });

            console.log("Undangan Dibuka");
        });
    });
</script>
    </body>
    </html>
